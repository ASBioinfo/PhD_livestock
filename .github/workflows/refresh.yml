name: refresh-positions

# Runs every Monday 06:00 UTC + lets you trigger it manually from the Actions tab.
# The commit it makes also counts as repo activity, so the schedule never
# auto-disables from inactivity.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install feedparser
      - run: python build_data.py
      - name: Commit updated data.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "refresh positions ($(date -u +%F))"
          git push
